

   - name: create user 
     ansible.builtin.user: 
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin 

   - name: delete app directory  # used for version change
     ansible.builtin.file:
      path: /app
      state: absent

   - name: create app directory 
     ansible.builtin.file:
      path: /app
      state: directory

   - name: delete the existing code # used for version change
     ansible.builtin.file:
      path: /tmp/{{component}}.zip
      state: absent

   - name: download the code from external location
     ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/{{component}}-v3.zip 
      dest: /tmp/{{component}}.zip

   - name: unarchieve {{component}}
     ansible.builtin.unarchive:
      src: /tmp/{{component}}.zip
      dest: /app
      remote_src: yes
      
    