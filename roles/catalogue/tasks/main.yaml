- name: nodejs setup
  ansible.builtin.import_role:
    name: common
    tasks_from: nodejs_setup

- name: app setup
  tags: 
  - deployment
  ansible.builtin.import_role:
   name: common
   tasks_from: app_setup

- name: systemd setup
  tags: 
  - deployment
  ansible.builtin.import_role:
   name: common
   tasks_from: systemd_setup

- name: daemon reload 
  tags: 
  - deployment
  ansible.builtin.import_role:
   name: common
   tasks_from: daemon_reload


- name: copy mongo repo
  ansible.builtin.copy:
   src: mongo.repo
   dest: /etc/yum.repos.d/mongo.repo

- name: install mongodb client 
  ansible.builtin.dnf:
   name: mongodb-mongosh
   state: present

  
- name: check products loaded
  ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
  register: catalogue_output

- name: print the output
  ansible.builtin.debug:
   msg: "{{ catalogue_output }}"

- name: load the products
  ansible.builtin.shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
  when: catalogue_output.stdout  | int < 0   

- name: start the service
  ansible.builtin.service:
   name: catalogue
   state: restarted
   enabled: yes   